agent:
  model: "claude-sonnet-4-20250514"
  max_iterations: 10
  max_context_tokens: 100000
  temperature: 0.7
  timezone: "Asia/Shanghai"
  workspace_path: "."

# ============================================================
# AE_LLM_RL_FOF: 量化因子特征配置
# ============================================================

data_pipeline:
  track_a:
    start_date: "2015-01-01"
    indices:
      - "000300.SH"   # 沪深300
      - "000852.SH"   # 中证1000
      - "CBA02701.CS" # 信用债指数
      - "AU9999.SGE"  # 黄金现货
      - "NH0100.NHF"  # 南华商品指数

  track_b:
    start_date: "2022-01-01"
    db_config:
      host: "localhost"
      port: 9000
      user: "default"
      password: ""
      database: "etf"
    etf_codes:
      - "510300.SH"   # 沪深300ETF
      - "512850.SH"   # 中证1000ETF
      - "511010.SH"   # 国债ETF
      - "518880.SH"   # 黄金ETF
      - "160217.SZ"   # 商品ETF

features:
  asset:
    momentum_window: 20       # momentum_20d
    volatility_window: 20     # volatility_20d
    corr_window: 20            # mean_corr_20d
    return_window: 5           # weekly_return

  macro:
    flow_window: 20           # 北向资金滚动窗口

  normalization:
    zscore_window: 252        # 252交易日 [t-252, t-1]
    min_periods: 60           # 最小样本数

# ============================================================
# 模型配置
# ============================================================
model:
  regime_autoencoder:
    input_dim: 25
    latent_dim: 6
    hidden_dim: 16
    leakyrelu_negative_slope: 0.01

# ============================================================
# WFO训练配置
# ============================================================
wfo:
  burn_in:
    phase1_weeks: 104      # 基座初始化
    phase2_weeks: 52       # MAD标尺铸造
    volatility_percentile: 0.75  # 波动率过滤分位数
  retrain:
    lookback_weeks: 104    # 季度重训窗口
  weights_path: "models/ae_weights_{year}Q{quarter}.pth"

# ============================================================
# 训练超参
# ============================================================
training:
  phase1_epochs: 50
  retrain_epochs: 30
  lr: 0.001

# ============================================================
# MDP Environment (PPO Agent Interaction)
# ============================================================
env:
  tau_min: 0.0          # threshold lower bound
  tau_max: 1.0          # threshold upper bound
  initial_alpha: 0.5    # fusion ratio at episode start
  initial_tau: 0.5      # threshold at episode start
  episode_max_steps: 252  # one trading year per episode

action_mapper:
  alpha_min: -0.5       # max weekly cut: 50% equity (2-week full exit)
  alpha_max:  0.1       # max weekly add: 10% (anti-chase)
  tau_delta_range: 0.1  # symmetric threshold delta ±0.1

regret_engine:
  ema_decay: 0.8        # EMA smoothing: heavily weight history

reward_function:
  lambda_turnover: 0.001   # turnover penalty coefficient
  lambda_te: 0.005         # tracking error penalty (normal regime)
  kappa: 2.0               # max-drawdown penalty (event regime) — NOT gamma
  eta: 1.0                 # regret penalty (event regime)

state_assembler:
  sharpe_clip_low: -3.0   # hard clip lower bound for port_sharpe_20d
  sharpe_clip_high: 3.0   # hard clip upper bound
  batch_size: 32

# ============================================================
# 推断配置
# ============================================================
inference:
  ema_alpha: 0.05         # EMA平滑系数
  zscore_window: 52       # Rolling Z-score窗口（52周=1年）
  mad_safe_floor: 0.05   # MAD底层物理防线
  clip_min: -5.0          # RL状态截断下界
  clip_max: 5.0            # RL状态截断上界

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ae-llm-rl-fof"
version = "0.1.0"
description = "Regime Anchor Autoencoder for Macro Regime Perception"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyyaml",
    "akshare>=1.0",
    "quantchdb>=0.1.11",
    "pandas",
    "numpy",
    "torch>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "ruff>=0.3",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
show_missing = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
    "B008",
    "C901",
    "UP008",
]
